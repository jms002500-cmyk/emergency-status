<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>우리 동네 응급실 실시간 현황</title>
    <style>
        body { font-family: 'Malgun Gothic', sans-serif; padding: 20px; max-width: 800px; margin: auto; }
        h2 { color: #333; text-align: center; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        th, td { border: 1px solid #ddd; padding: 12px; text-align: center; font-size: 14px; }
        th { background-color: #f4f4f4; }
        /* 병상 여유가 있으면 초록색, 없으면 빨간색으로 표시 */
        .good { color: #28a745; font-weight: bold; }
        .bad { color: #dc3545; font-weight: bold; }
        .info { font-size: 12px; color: #666; text-align: right; margin-top: 10px; }
    </style>
</head>
<body>

    <h2>🏥 화성시 응급실 실시간 가용 현황</h2>
    
    <table>
        <thead>
            <tr>
                <th>병원명</th>
                <th>응급 병상</th>
                <th>수술실 여부</th>
                <th>정보 업데이트 시간</th>
            </tr>
        </thead>
        <tbody id="data-table">
            <tr><td colspan="4">최신 데이터를 불러오는 중입니다...</td></tr>
        </tbody>
    </table>
    <div class="info">* 데이터 제공: 국립중앙의료원 공공데이터</div>

    <script>
        // 파이썬이 만든 JSON 파일을 읽어오는 자바스크립트 코드
        fetch('emergency_data.json')
            .then(response => response.json())
            .then(data => {
                const tbody = document.getElementById('data-table');
                tbody.innerHTML = ''; // 로딩 문구 지우기
                
                data.forEach(hospital => {
                    // 병상 수에 따라 색상 클래스 지정
                    let bedsClass = '';
                    if (hospital.beds !== 'Full' && Number(hospital.beds) > 5) bedsClass = 'good';
                    else if (hospital.beds === 'Full' || Number(hospital.beds) <= 0) bedsClass = 'bad';

                    let tr = document.createElement('tr');
                    tr.innerHTML = `
                        <td style="text-align: left; font-weight: bold;">${hospital.name}</td>
                        <td class="${bedsClass}">${hospital.beds}</td>
                        <td>${hospital.surgery}</td>
                        <td>${hospital.time}</td>
                    `;
                    tbody.appendChild(tr);
                });
            })
            .catch(error => {
                document.getElementById('data-table').innerHTML = '<tr><td colspan="4">데이터를 불러오는데 실패했습니다.</td></tr>';
                console.error('Error:', error);
            });
    </script>

</body>
</html>
